
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SOC v3 即時攻擊地圖</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:black; }
#map { height: 100vh; }

#panel{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.7);
    color:#00ffcc;
    padding:15px;
    border-radius:10px;
    z-index:1000;
    box-shadow:0 0 15px #00ffcc;
}

.attack-dot{
    background:red;
    border-radius:50%;
    width:10px;
    height:10px;
    box-shadow:0 0 10px red;
}
</style>
</head>

<body>

<div id="panel">
    <h2>🔥 SOC v3 攻擊地圖</h2>
    <div>攻擊數量: <span id="count">0</span></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([20, 0], 2);

// 黑色風格地圖
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// 目標（你的伺服器位置）
var target = [25.03, 121.56]; // 台灣

// 清除舊圖層
var layers = [];

function clearMap(){
    layers.forEach(l => map.removeLayer(l));
    layers = [];
}

// 紅點
function addAttackPoint(lat, lon){
    let marker = L.circleMarker([lat, lon], {
        radius:6,
        color:'red',
        fillColor:'red',
        fillOpacity:0.9
    }).addTo(map);

    layers.push(marker);
}

// 飛線動畫
function drawAttackLine(lat, lon){
    let line = L.polyline([[lat, lon], target], {
        color:'lime',
        weight:2,
        opacity:0.7
    }).addTo(map);

    layers.push(line);

    // 閃一下消失（動畫感）
    setTimeout(() => {
        map.removeLayer(line);
    }, 800);
}

// 爆炸效果
function hitEffect(){
    let circle = L.circle(target, {
        radius:200000,
        color:'yellow',
        fillColor:'yellow',
        fillOpacity:0.3
    }).addTo(map);

    setTimeout(()=>map.removeLayer(circle), 500);
}

// 載入資料
async function loadData(){
    try{
        let res = await fetch('/api/attacks');
        let data = await res.json();

        document.getElementById("count").innerText = data.length;

        clearMap();

        data.forEach(a=>{
            if(a.lat && a.lon){
                addAttackPoint(a.lat, a.lon);
                drawAttackLine(a.lat, a.lon);
            }
        });

        if(data.length > 0){
            hitEffect();
        }

    }catch(e){
        console.log("錯誤:", e);
    }
}

// 每5秒更新
setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
