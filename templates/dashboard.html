
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SOC v3 攻擊地圖</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; background:black; }
#map { height:100vh; }

#panel{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.7);
    color:#00ffcc;
    padding:15px;
    border-radius:10px;
    z-index:1000;
}
</style>
</head>

<body>

<div id="panel">
    <h2>🔥 SOC v3 即時攻擊</h2>
    攻擊數量: <span id="count">0</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')
.addTo(map);

var target = [25.03,121.56]; // 台灣

var layers = [];

function clearMap(){
    layers.forEach(l => map.removeLayer(l));
    layers = [];
}

function addPoint(lat, lon){
    let m = L.circleMarker([lat, lon], {
        radius:6,
        color:'red',
        fillColor:'red',
        fillOpacity:0.9
    }).addTo(map);

    layers.push(m);
}

function drawLine(lat, lon){
    let line = L.polyline([[lat, lon], target], {
        color:'lime'
    }).addTo(map);

    layers.push(line);

    setTimeout(()=>map.removeLayer(line), 800);
}

function loadData(){
    fetch('/api/attacks')
    .then(r=>r.json())
    .then(data=>{
        document.getElementById("count").innerText = data.length;

        clearMap();

        data.forEach(a=>{
            if(a.lat && a.lon){
                addPoint(a.lat, a.lon);
                drawLine(a.lat, a.lon);
            }
        });
    });
}

setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
